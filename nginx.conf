server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Frontend static files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # No caching for JS/CSS
    location ~* \.(js|css)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    client_max_body_size 15m;

    # API reverse proxy
    location /api/ {
        # Re-resolve the api container's IP on every connection (Docker embedded DNS)
        # instead of caching it for the nginx worker's lifetime — otherwise recreating
        # the api container (e.g. on redeploy) leaves nginx pointing at a dead IP
        # until nginx itself is restarted.
        resolver 127.0.0.11 valid=10s;
        set $api_upstream http://api:5000;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }
}
