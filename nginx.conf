server {
    listen 80;
    server_name _;

    client_max_body_size 55m;

    location = /admin {
        return 308 /admin/;
    }

    # Signed Android beta builds. The app only opens a HTTPS URL here; Android
    # Package Installer still verifies the application id and signing key and
    # always asks the person to confirm installation.
    location /downloads/ {
        alias /var/www/releases/;
        autoindex off;
        default_type application/vnd.android.package-archive;
        add_header Cache-Control "no-store";
        add_header X-Content-Type-Options "nosniff";
    }

    # React/Vite admin SPA. Rewrite strips the public /admin/ prefix before
    # proxying while the variable keeps Docker DNS re-resolution working.
    location /admin/ {
        resolver 127.0.0.11 valid=10s;
        set $admin_upstream http://admin:80;
        rewrite ^/admin/(.*)$ /$1 break;
        proxy_pass $admin_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API reverse proxy. The legacy public PWA was removed; the only browser
    # UI now served by this gateway is the protected admin SPA at /admin/.
    # Anything outside /api/ and /admin/ falls through to nginx's default 404.
    location /api/ {
        # Re-resolve the api container's IP on every connection (Docker embedded DNS)
        # instead of caching it for the nginx worker's lifetime — otherwise recreating
        # the api container (e.g. on redeploy) leaves nginx pointing at a dead IP
        # until nginx itself is restarted.
        resolver 127.0.0.11 valid=10s;
        set $api_upstream http://api:5000;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }
}
