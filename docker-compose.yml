services:
  api:
    build: ./VoiceAssistant.API
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__Default=Host=db;Database=vass;Username=app;Password=${DB_PASSWORD}
      - Gemini__ApiKey=${GEMINI_API_KEY}
      - Audio__Path=/app/audio
      - Jwt__Secret=${JWT_SECRET}
      - Jwt__Issuer=Vass
      - Jwt__Audience=Vass
      - Encryption__Key=${ENCRYPTION_KEY}
      - Piper__BaseUrl=http://tts:5001
      # speaker-id below is opt-in (profiles: ["speaker-id"], not started by
      # `docker compose up` on its own) -- this hostname is only ever dialed
      # if Features__SpeakerIdentificationEnabled is ALSO set to true
      # (SpeakerRegistryService.IdentifyAsync no-ops before ever reaching it
      # otherwise). Both must be turned on together
      # (PROJECT-AUDIT-2026-07-10 OPS-02, SEC-02).
      - SpeakerId__BaseUrl=http://speaker-id:5003
    volumes:
      - audio:/app/audio
    depends_on:
      db:
        condition: service_healthy
      tts:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  tts:
    build: ./piper-tts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # Opt-in only: `docker compose --profile speaker-id up` (or COMPOSE_PROFILES=
  # speaker-id). Not started by a plain `docker compose up`, and `api` does not
  # depend_on it -- speaker identification is disabled by default
  # (Features:SpeakerIdentificationEnabled=false) pending the tenant-isolation
  # work SEC-02 flagged as a prerequisite for ever turning it on for real.
  # Previously this service had no compose entry at all despite api's
  # SpeakerId__BaseUrl pointing at it -- a real, if disabled-today, footgun
  # for whoever next enables the feature flag without knowing to also stand
  # this up (PROJECT-AUDIT-2026-07-10 OPS-02).
  speaker-id:
    build: ./speaker-id
    profiles: ["speaker-id"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5003/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s # embedding model load is slow on first boot
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=vass
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d vass"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # Now a pure /api/* reverse proxy in front of `api` -- it used to also serve
  # the legacy PWA's static files, removed along with `frontend/`
  # (PROJECT-AUDIT-2026-07-10 ARCH-01: mobile/ is the sole client now). Kept
  # (not removed outright) because the external Caddy proxy on the VPS points
  # at this container's published port, and removing it would mean exposing
  # `api` directly -- a bigger change that would also need Program.cs's
  # ForwardedHeaders ForwardLimit (currently 2, counting on exactly this
  # nginx hop) recalibrated to 1. Out of scope for this fix.
  nginx:
    image: nginx:alpine
    ports:
      - "127.0.0.1:4001:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  audio:
