services:
  api:
    build: ./VoiceAssistant.API
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__Default=Host=db;Database=vass;Username=app;Password=${DB_PASSWORD}
      - Gemini__ApiKey=${GEMINI_API_KEY}
      # The central response + native tool loop can be switched without a
      # database migration: openai or gemini. Gemini remains the rollback.
      - PrimaryModel__Provider=${PRIMARY_MODEL_PROVIDER:-gemini}
      - OpenAI__ApiKey=${OPENAI_API_KEY:-}
      - OpenAI__Model=${OPENAI_MODEL:-gpt-5.4}
      - Audio__Path=/app/audio
      - Visual__Path=/app/visual
      - Jwt__Secret=${JWT_SECRET}
      - Jwt__Issuer=Vass
      - Jwt__Audience=Vass
      - Encryption__Key=${ENCRYPTION_KEY}
      - Registration__AutoApprove=${REGISTRATION_AUTO_APPROVE:-true}
      - Admin__Email=${ADMIN_EMAIL:-}
      - Features__LongTermMemoryEnabled=${LONG_TERM_MEMORY_ENABLED:-true}
      - MobileUpdates__Android__LatestVersion=${MOBILE_UPDATE_ANDROID_LATEST_VERSION:-}
      - MobileUpdates__Android__LatestVersionCode=${MOBILE_UPDATE_ANDROID_LATEST_VERSION_CODE:-0}
      - MobileUpdates__Android__MinimumSupportedVersionCode=${MOBILE_UPDATE_ANDROID_MIN_SUPPORTED_VERSION_CODE:-0}
      - MobileUpdates__Android__DownloadUrl=${MOBILE_UPDATE_ANDROID_DOWNLOAD_URL:-}
      - MobileUpdates__Android__Sha256=${MOBILE_UPDATE_ANDROID_SHA256:-}
      - MobileUpdates__Android__ReleaseNotes=${MOBILE_UPDATE_ANDROID_RELEASE_NOTES:-}
      # speaker-id below is opt-in (profiles: ["speaker-id"], not started by
      # `docker compose up` on its own) -- this hostname is only ever dialed
      # if Features__SpeakerIdentificationEnabled is ALSO set to true
      # (SpeakerRegistryService.IdentifyAsync no-ops before ever reaching it
      # otherwise). Both must be turned on together
      # (PROJECT-AUDIT-2026-07-10 OPS-02, SEC-02).
      - SpeakerId__BaseUrl=http://speaker-id:5003
    volumes:
      - audio:/app/audio
      - visual:/app/visual
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # Opt-in only: `docker compose --profile speaker-id up` (or COMPOSE_PROFILES=
  # speaker-id). Not started by a plain `docker compose up`, and `api` does not
  # depend_on it -- speaker identification is disabled by default
  # (Features:SpeakerIdentificationEnabled=false) pending the tenant-isolation
  # work SEC-02 flagged as a prerequisite for ever turning it on for real.
  # Previously this service had no compose entry at all despite api's
  # SpeakerId__BaseUrl pointing at it -- a real, if disabled-today, footgun
  # for whoever next enables the feature flag without knowing to also stand
  # this up (PROJECT-AUDIT-2026-07-10 OPS-02).
  speaker-id:
    build: ./speaker-id
    profiles: ["speaker-id"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5003/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s # embedding model load is slow on first boot
    restart: unless-stopped

  db:
    build: ./postgres-vector
    image: vass-postgres-vector:17-0.8.2
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=vass
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d vass"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  admin:
    build: ./admin
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # Gateway for /api/* and the protected React admin SPA at /admin/. It used
  # to serve the legacy public PWA's static files, removed with `frontend/`.
  # Kept
  # (not removed outright) because the external Caddy proxy on the VPS points
  # at this container's published port, and removing it would mean exposing
  # `api` directly -- a bigger change that would also need Program.cs's
  # ForwardedHeaders ForwardLimit (currently 2, counting on exactly this
  # nginx hop) recalibrated to 1. Out of scope for this fix.
  nginx:
    image: nginx:alpine
    ports:
      - "127.0.0.1:4001:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./releases:/var/www/releases:ro
    depends_on:
      api:
        condition: service_healthy
      admin:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  audio:
  visual:
