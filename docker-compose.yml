services:
  api:
    build: ./VoiceAssistant.API
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__Default=Host=db;Database=vass;Username=app;Password=${DB_PASSWORD}
      - Anthropic__ApiKey=${ANTHROPIC_API_KEY}
      - OpenAI__ApiKey=${OPENAI_API_KEY}
      - Gemini__ApiKey=${GEMINI_API_KEY}
      - Audio__Path=/app/audio
      - Jwt__Secret=${JWT_SECRET}
      - Jwt__Issuer=PolishTutor
      - Jwt__Audience=PolishTutor
      - Piper__BaseUrl=http://tts:5001
    volumes:
      - audio:/app/audio
    depends_on:
      db:
        condition: service_healthy
      tts:
        condition: service_healthy
    restart: unless-stopped

  tts:
    build: ./piper-tts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=vass
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d vass"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "127.0.0.1:4001:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
  audio:
