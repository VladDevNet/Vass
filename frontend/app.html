<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vass — Ольга</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Vass">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Menu">&#9776;</button>
    <div id="sidebar-backdrop" class="sidebar-backdrop"></div>

    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>Ольга</h2>
            </div>
            <button id="new-session-btn" class="btn-primary hidden">+ Новый разговор</button>
            <div id="sessions-list" class="sessions-list"></div>
            <div class="sidebar-footer">
                <span id="user-email"></span>
                <div class="sidebar-footer-actions">
                    <a href="settings.html" class="btn-footer-icon" title="Настройки">&#x2699;</a>
                    <button id="logout-btn" class="btn-footer-icon" title="Выйти">&#x23FB;</button>
                </div>
            </div>
        </aside>

        <!-- Chat area -->
        <main class="chat-area">
            <div id="chat-messages" class="messages">
                <div class="welcome-message">
                    <p>Здравствуйте! Я Ольга, ваш голосовой помощник.</p>
                </div>
            </div>
            <div id="tts-settings" class="tts-settings hidden">
                <label>Голос: <select id="tts-voice"></select></label>
                <label>Скорость: <input type="range" id="tts-rate" min="0.3" max="1.5" step="0.1" value="0.9"> <span id="tts-rate-val">0.9</span></label>
            </div>
            <div id="attachment-preview" class="attachment-preview hidden"></div>
            <div class="chat-input-area">
                <button id="voice-btn" class="btn-icon" title="Голосовой ввод">&#x1f3a4;</button>
                <button id="yolo-btn" class="btn-icon" title="YOLO режим (разговорный чат)">⚡</button>
                <button id="camera-btn" class="btn-icon" title="Сфотографировать текст">&#x1f4f7;</button>
                <input type="file" id="camera-input" accept="image/*" capture="environment" class="hidden">
                <textarea id="message-input" placeholder="Напишите сообщение..." rows="1"></textarea>
                <button id="tts-settings-btn" class="btn-icon" title="Настройки голоса">&#x2699;</button>
                <button id="send-btn" class="btn-primary">Отправить</button>
            </div>
        </main>
    </div>

    <!-- YOLO Floating Button -->
    <button id="yolo-floating-btn" class="yolo-floating-btn">🎙️ Голосовой режим (YOLO)</button>

    <!-- YOLO Mode Overlay -->
    <div id="yolo-overlay" class="yolo-overlay hidden">
        <div class="yolo-container">
            <div class="yolo-header">
                <div class="yolo-title-area">
                    <span class="yolo-badge">YOLO Mode</span>
                    <h2 class="yolo-session-title">Разговор с Ольгой</h2>
                </div>
                <button id="yolo-close-btn" class="yolo-close-btn" title="Выйти">&times;</button>
            </div>

            <div class="yolo-visualizer-container">
                <div class="yolo-orb-outer">
                    <div id="yolo-orb" class="yolo-orb state-idle"></div>
                </div>
                <div id="yolo-status" class="yolo-status">Готова к разговору</div>
            </div>

            <div class="yolo-preview-container">
                <div class="yolo-preview-header">
                    <span>Последние реплики</span>
                    <button id="yolo-toggle-text-btn" class="btn-small">Скрыть текст</button>
                </div>
                <div id="yolo-text-preview" class="yolo-text-preview"></div>
            </div>

            <div class="yolo-controls">
                <div class="yolo-control-row">
                    <label for="yolo-sensitivity">Порог тишины (чувствительность VAD):</label>
                    <input type="range" id="yolo-sensitivity" min="0.005" max="0.08" step="0.005" value="0.02">
                    <span id="yolo-sensitivity-val">0.02</span>
                </div>
                <div class="yolo-buttons">
                    <button id="yolo-mute-btn" class="yolo-btn-secondary" title="Выключить микрофон">🎙️</button>
                    <button id="yolo-speak-now-btn" class="yolo-btn-primary">Начать говорить</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/voice.js"></script>
    <script src="js/yolo.js"></script>
</body>
</html>
