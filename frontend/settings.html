<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vass — Налаштування</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Vass">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="settings-page">
        <div class="settings-container">
            <div class="settings-header">
                <a href="app.html" class="settings-back">&larr; Назад</a>
                <h1>Налаштування</h1>
            </div>

            <div id="settings-error" class="error hidden"></div>
            <div id="settings-success" class="settings-success hidden">Збережено!</div>

            <!-- Profile -->
            <section class="settings-section">
                <h2>Профіль</h2>
                <label class="settings-label">
                    Ім'я
                    <input type="text" id="display-name" placeholder="Як до тебе звертатись?">
                </label>
                <label class="settings-label">
                    Мова інтерфейсу
                    <select id="interface-language">
                        <option value="uk">Українська</option>
                        <option value="ru">Русский</option>
                    </select>
                </label>
            </section>

            <!-- API Keys -->
            <section class="settings-section">
                <h2>API ключі</h2>
                <p class="settings-hint">Власні API ключі. Якщо не вказані — використовуються серверні.</p>
                <label class="settings-label">
                    OpenAI API Key
                    <input type="password" id="openai-key" placeholder="sk-...">
                </label>
                <label class="settings-label">
                    Anthropic API Key
                    <input type="password" id="anthropic-key" placeholder="sk-ant-...">
                </label>
                <label class="settings-label">
                    Gemini API Key
                    <input type="password" id="gemini-key" placeholder="AIza...">
                </label>
            </section>

            <!-- System Prompt -->
            <section class="settings-section">
                <h2>Системний промпт</h2>
                <p class="settings-hint">Додаткові інструкції для Ольги. <button id="show-default-btn" class="btn-link">Показати стандартний промпт</button></p>
                <div id="default-prompt-block" class="settings-default-prompt hidden"></div>
                <textarea id="custom-prompt" rows="6" placeholder="Наприклад: Завжди давай приклади з реального життя. Фокусуйся на бізнес-лексиці."></textarea>
            </section>

            <button id="save-btn" class="btn-primary btn-block">Зберегти</button>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/settings.js"></script>
</body>
</html>
